name: CI/CD Pipeline

on:
  push:
    branches: 
        - main
        - staging
        - development
        - ci-cd
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
        - main
        - staging
        - development
        - ci-cd
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('*/.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew assemble

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: build/libs/*.jar

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.JDBC_DATABASE_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.JDBC_DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_DATABASE }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('*/.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U ${{ secrets.JDBC_DATABASE_USERNAME }}; do
            sleep 1
          done

      - name: Run unit tests
        run: ./gradlew test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://${{ secrets.DB_HOST }}/${{ secrets.DB_DATABASE }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.JDBC_DATABASE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.JDBC_DATABASE_PASSWORD }}

  sonarqube-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.JDBC_DATABASE_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.JDBC_DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_DATABASE }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out the Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java toolchain
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Set gradlew as executable
        run: chmod +x ./gradlew
        
      - name: Build with Gradle
        run: ./gradlew build
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://${{ secrets.DB_HOST }}/${{ secrets.DB_DATABASE }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.JDBC_DATABASE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.JDBC_DATABASE_PASSWORD }}

      - name: Analyze with SonarQube
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args:
            -Dsonar.projectKey=amerta-backend
            -Dsonar.host.url=https://sonarqube.cs.ui.ac.id
            -Dsonar.java.binaries=.
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

  publish-staging:
    name: Publish Docker Image (Staging)
    runs-on: ubuntu-latest
    needs: [test, sonarqube-analysis]

    if: (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')) && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/development' || github.ref == 'refs/heads/ci-cd')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: List downloaded artifacts
        run: ls -al

      - name: Docker login
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.REGISTRY_USER }} --password-stdin docker.io

      - name: Set Docker BuildKit
        run: export DOCKER_BUILDKIT=1

      - name: Build Docker Image for Staging
        run: |
          docker build --build-arg PRODUCTION=false --build-arg JDBC_DATABASE_PASSWORD=${{ secrets.JDBC_DATABASE_PASSWORD }} --build-arg JDBC_DATABASE_URL=${{ secrets.JDBC_DATABASE_URL }} --build-arg JDBC_DATABASE_USERNAME=${{ secrets.JDBC_DATABASE_USERNAME }} --build-arg JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} -t ${{ secrets.REGISTRY_USER }}/${{ secrets.IMAGE_NAME }}:staging .
          docker push ${{ secrets.REGISTRY_USER }}/${{ secrets.IMAGE_NAME }}:staging

  publish-production:
    name: Publish Docker Image (Production)
    runs-on: ubuntu-latest
    needs: [test, sonarqube-analysis]

    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: List downloaded artifacts
        run: ls -al

      - name: Docker login
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.REGISTRY_USER }} --password-stdin docker.io

      - name: Set Docker BuildKit
        run: export DOCKER_BUILDKIT=1

      - name: Build Docker Image for Production
        run: |
          docker build --build-arg PRODUCTION=true --build-arg JDBC_DATABASE_PASSWORD=${{ secrets.PRODUCTION_JDBC_DATABASE_PASSWORD }} --build-arg JDBC_DATABASE_URL=${{ secrets.PRODUCTION_JDBC_DATABASE_URL }} --build-arg JDBC_DATABASE_USERNAME=${{ secrets.PRODUCTION_JDBC_DATABASE_USERNAME }} --build-arg JWT_SECRET_KEY=${{ secrets.PRODUCTION_JWT_SECRET_KEY }} -t ${{ secrets.REGISTRY_USER }}/${{ secrets.IMAGE_NAME }}:latest .
          docker push ${{ secrets.REGISTRY_USER }}/${{ secrets.IMAGE_NAME }}:latest

  deploy-staging:
    name: Deploy to GCP (Staging)
    runs-on: ubuntu-latest
    needs: publish-staging

    if: (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')) && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/development' || github.ref == 'refs/heads/ci-cd')
    environment:
        name: staging
        url: https://amsesman-staging.vercel.app
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get install openssh-client

      - name: Create SSH key
        run: echo "${{ secrets.SSH_KEY }}" > ssh-key.pem

      - name: Update permission
        run: chmod 400 ssh-key.pem

      - name: Deploy to GCP Staging
        run: |
          ssh -o StrictHostKeyChecking=no -i ssh-key.pem ${{ secrets.GCP_USERNAME }}@${{ secrets.GCP_STATIC_IP }} "
            sudo docker container rm -f ${{ secrets.CONTAINER_NAME }} || true &&
            sudo docker image rm -f ${{ secrets.REGISTRY_USER }}/${{ secrets.IMAGE_NAME }}:staging || true &&
            sudo docker run --name ${{ secrets.CONTAINER_NAME }} -d -p 80:8080 ${{ secrets.REGISTRY_USER }}/${{ secrets.IMAGE_NAME }}:staging"

  deploy-production:
    name: Deploy to GCP (Production)
    runs-on: ubuntu-latest
    needs: publish-production

    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
        name: production
        url: https://amsesman.vercel.app
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get install openssh-client

      - name: Create SSH key
        run: echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ssh-key.pem

      - name: Update permission
        run: chmod 400 ssh-key.pem

      - name: Deploy to GCP Production
        run: |
          ssh -o StrictHostKeyChecking=no -i ssh-key.pem ${{ secrets.GCP_USERNAME }}@${{ secrets.PRODUCTION_GCP_STATIC_IP }} "
            sudo docker container rm -f ${{ secrets.PRODUCTION_CONTAINER_NAME }} || true &&
            sudo docker image rm -f ${{ secrets.REGISTRY_USER }}/${{ secrets.IMAGE_NAME }}:latest || true &&
            sudo docker run --name ${{ secrets.PRODUCTION_CONTAINER_NAME }} -d -p 80:8080 ${{ secrets.REGISTRY_USER }}/${{ secrets.IMAGE_NAME }}:latest"